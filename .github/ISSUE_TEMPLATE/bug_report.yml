name: Bug Report
description: Report a bug or unexpected behavior in harn
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out this form as completely as possible.

  - type: input
    id: version
    attributes:
      label: harn version
      description: Run `harn version` and paste the output
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / Shell
      description: e.g. macOS 14.4 / zsh 5.9
      placeholder: "macOS 15 / zsh 5.9"
    validations:
      required: true

  - type: input
    id: ai-cli
    attributes:
      label: AI CLI
      description: Which AI CLI are you using?
      placeholder: "copilot v1.x  or  claude v1.x"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug
      placeholder: |
        1. cd /my-project
        2. harn start
        3. Select backlog item "..."
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste relevant output from `harn tail` or `.harness/current.log`
      render: shell

  - type: textarea
    id: config
    attributes:
      label: .harness_config (optional)
      description: Paste your config (redact any sensitive values)
      render: shell
