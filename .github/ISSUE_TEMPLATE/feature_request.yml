name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe the problem you want to solve, not just the solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this feature solve? What workflow is painful right now?
      placeholder: "When running harn with multiple projects, I have to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've tried?

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of harn does this affect?
      options:
        - Sprint loop (planner / generator / evaluator)
        - Git integration (branch, PR, merge)
        - CLI commands
        - Agent prompts
        - Configuration
        - Install / packaging
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, examples, related issues, etc.
